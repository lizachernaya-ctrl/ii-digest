<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>II Digest</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
:root{--bg:#0a0a0f;--sf:#12121a;--br:#2a2a3d;--g:#00ff88;--pk:#ff006e;--bl:#00cfff;--yl:#ffcc00;--tx:#e0e0f0;--mu:#6060a0}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'VT323',monospace;font-size:18px;line-height:1.5;min-height:100vh}
.sc{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);pointer-events:none;z-index:999}
.w{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
.hdr{text-align:center;padding:2.5rem 0 1.5rem}
.team{font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.8vw,12px);color:var(--mu);letter-spacing:6px;margin-bottom:1rem}
.ttl{font-family:'Press Start 2P',monospace;font-size:clamp(12px,2.8vw,20px);color:var(--g);text-shadow:0 0 20px rgba(0,255,136,.4),3px 3px 0 #006633;line-height:1.7;letter-spacing:2px}
.sub{font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.2vw,9px);color:var(--bl);margin-top:1rem;letter-spacing:3px;opacity:.75}
.blink{animation:bl 1.2s step-end infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
.dv{height:4px;background:repeating-linear-gradient(90deg,var(--g) 0,var(--g) 8px,transparent 8px,transparent 16px);margin:1.5rem 0;opacity:.4}
.bdg{display:inline-block;font-family:'Press Start 2P',monospace;font-size:8px;background:var(--pk);color:#fff;padding:6px 14px;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));margin-bottom:1.5rem}
.sts{background:var(--sf);border:1px solid var(--br);padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;flex-wrap:wrap}
.st{text-align:center;flex:1;min-width:80px}
.sn{font-family:'Press Start 2P',monospace;font-size:18px;color:var(--yl);display:block}
.sl{font-size:14px;color:var(--mu);margin-top:4px}
.stl{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--yl);margin:2rem 0 1rem;display:flex;align-items:center;gap:10px}
.stl::before{content:"\25BA"}
.pg{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:12px;margin-bottom:2rem}
.pc{background:var(--sf);border:1px solid var(--br);padding:1.25rem}
.pc.liza{border-top:3px solid var(--pk)}.pc.ilya{border-top:3px solid var(--bl)}
.pt{display:flex;align-items:center;gap:14px;margin-bottom:1rem}
.cw{width:56px;height:56px;flex-shrink:0;border:1px solid var(--br);display:flex;align-items:center;justify-content:center}
.pc.liza .cw{border-color:rgba(255,0,110,.4);background:rgba(255,0,110,.06)}
.pc.ilya .cw{border-color:rgba(0,207,255,.4);background:rgba(0,207,255,.06)}
.pn{font-family:'Press Start 2P',monospace;font-size:10px;margin-bottom:4px}
.pc.liza .pn{color:var(--pk)}.pc.ilya .pn{color:var(--bl)}
.ptm{font-size:14px;color:var(--mu);margin-bottom:6px}
.pcl{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--yl);background:rgba(255,204,0,.08);border:1px solid rgba(255,204,0,.25);padding:3px 7px;display:inline-block}
.xw{margin:10px 0}
.xl{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--mu);display:flex;justify-content:space-between;margin-bottom:4px}
.xb{height:6px;background:var(--br)}
.xf{height:100%;animation:xg 1.2s ease-out forwards}
.pc.liza .xf{background:var(--pk)}.pc.ilya .xf{background:var(--bl)}
@keyframes xg{from{width:0}}
.lb{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--mu);cursor:pointer;border:1px solid var(--br);background:none;padding:5px 10px;margin-top:6px;width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center}
.ld{display:none;margin-top:8px;border-top:1px solid var(--br);padding-top:10px}
.ld.open{display:block}
.lr{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:14px}
.lk{font-family:'Press Start 2P',monospace;font-size:7px;min-width:58px;padding:2px 5px;text-align:center;flex-shrink:0}
.pc.liza .lk{background:rgba(255,0,110,.12);color:var(--pk)}
.pc.ilya .lk{background:rgba(0,207,255,.12);color:var(--bl)}
.lv{color:var(--tx);opacity:.8;line-height:1.35}
.ds{background:var(--sf);border:1px solid var(--br);padding:1.25rem 1.5rem;margin-bottom:1.25rem}
.dh{display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--br)}
.di{width:40px;height:40px;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ds.liza .di{border-color:var(--pk);background:rgba(255,0,110,.1)}
.ds.ilya .di{border-color:var(--bl);background:rgba(0,207,255,.1)}
.dn{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--tx)}
.dr{font-size:13px;color:var(--mu);margin-top:2px}
.ac{display:flex;flex-direction:column;gap:8px}
.a{background:var(--bg);border-left:3px solid;padding:.7rem .9rem}
.ds.liza .a{border-color:var(--pk)}.ds.ilya .a{border-color:var(--bl)}
.at{font-family:'Press Start 2P',monospace;font-size:8px;margin-bottom:5px;line-height:1.7}
.ds.liza .at{color:var(--pk)}.ds.ilya .at{color:var(--bl)}
.ad{font-size:16px;color:var(--tx);opacity:.85;line-height:1.4}
.xt{display:inline-block;font-family:'Press Start 2P',monospace;font-size:7px;background:var(--yl);color:#000;padding:3px 8px;margin-top:6px}
.al{display:flex;flex-direction:column;gap:6px}
.ai{background:var(--sf);border:1px solid var(--br);padding:.7rem 1rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.ai:hover{border-color:var(--yl)}
.aib{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--mu)}
.ait{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--yl)}
.ab{display:none;background:var(--bg);border:1px solid var(--br);border-top:none;padding:1rem}
.ab.open{display:block}
.ae{margin-bottom:1rem}
.aw{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--mu);margin-bottom:6px}
.aa{border-left:2px solid var(--br);padding:5px 10px;margin-bottom:5px}
.aat{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--bl);margin-bottom:3px}
.aad{font-size:14px;color:var(--tx);opacity:.65}
.ft{text-align:center;padding:2rem 0;color:var(--mu);font-size:14px;border-top:1px solid var(--br);margin-top:2.5rem}
.ft span{color:var(--g)}
@media(max-width:600px){.sts{gap:1rem}.ds{padding:1rem}.pg{grid-template-columns:1fr}}
</style></head><body>
<div class="sc"></div>
<div class="w" id="app"></div>
<script>
var SP={
liza:{px:["00022200","00222220","00244200","01111110","01141110","01111110","03333330","05550550"],p:{"1":"#f5c5a3","2":"#cc2255","3":"#ff006e","4":"#000","5":"#880033","0":null}},
ilya:{px:["00222220","02244220","02211220","01111110","01141110","01111110","03350330","06600660"],p:{"1":"#e8d0a0","2":"#334466","3":"#00cfff","4":"#000","5":"#224466","6":"#001133","0":null}}
};
var LG={
liza:[["КЛАСС","Мастер смыслов — видит суть любого текста"],["СКИЛЛ","~10 агентов: копирайтер, редактор, лингвист"],["ФРАКЦИЯ","Малый оркестр — каждое слово на месте"],["ДЕВИЗ","Текст — это смысл. Остальное автоматизировано."]],
ilya:[["КЛАСС","Главный разум — верит только цифрам"],["СКИЛЛ","~70 агентов: SEO, контекст, аналитика, стратегия"],["ФРАКЦИЯ","Большой оркестр — никаких решений без данных"],["ДЕВИЗ","Если нельзя измерить — не считается."]]
};
var IC={liza:"&#128308;",ilya:"&#128309;"};
function ds(cv,px,p){var c=cv.getContext("2d"),s=6;px.forEach(function(r,y){r.split("").forEach(function(ch,x){var col=p[ch];if(col){c.fillStyle=col;c.fillRect(x*s,y*s,s,s);}});});}
function pc(p){
var leg=(LG[p.id]||[]).map(function(a){return'<div class="lr"><span class="lk">'+a[0]+'</span><span class="lv">'+a[1]+'</span></div>';}).join("");
return'<div class="pc '+p.id+'"><div class="pt"><div class="cw"><canvas id="cv-'+p.id+'" width="48" height="48" style="image-rendering:pixelated;display:block"></canvas></div><div><div class="pn">'+p.name+'</div><div class="ptm">// '+p.team+'</div><div class="pcl">'+p.class+'</div></div></div><div class="xw"><div class="xl"><span>XP</span><span>LVL '+p.level+'</span></div><div class="xb"><div class="xf" style="width:'+p.xp+'%"></div></div></div><button class="lb" onclick="tl(this)"><span>ЛЕГЕНДА</span><span>+</span></button><div class="ld">'+leg+'</div></div>';
}
function db(p){
var ac=(p.achievements||[]).map(function(a){return'<div class="a"><div class="at">'+a.title+'</div><div class="ad">'+a.desc+'</div>'+( a.xp?'<span class="xt">+'+a.xp+' XP</span>':"" )+'</div>';}).join("");
return'<div class="ds '+p.id+'"><div class="dh"><div class="di">'+( IC[p.id]||"o" )+'</div><div><div class="dn">'+p.name+'</div><div class="dr">// '+p.team+'</div></div></div><div class="ac">'+ac+'</div></div>';
}
function ai(w){
var en=(w.players||[]).map(function(p){
var ac=(p.achievements||[]).map(function(a){return'<div class="aa"><div class="aat">'+a.title+'</div><div class="aad">'+a.desc+'</div></div>';}).join("");
return'<div class="ae"><div class="aw">'+( IC[p.id]||"" )+' '+p.name+' // '+p.team+'</div>'+ac+'</div>';
}).join("");
return'<div><div class="ai" onclick="ta(this)"><span class="aib">ДАЙДЖЕСТ #'+w.number+' &middot; '+w.dates+'</span><span class="ait">[+]</span></div><div class="ab">'+en+'</div></div>';
}
function render(d){
var c=d.current;
document.getElementById("app").innerHTML=
'<div class="hdr"><div class="team">PITERSTORY TEAM</div><div class="ttl">&#1048;&#1048; &#1056;&#1040;&#1047;, &#1048;&#1048; &#1044;&#1042;&#1040;,<br>&#1048;&#1048; &#1056;&#1040;&#1047;-&#1056;&#1040;&#1047;-&#1056;&#1040;&#1047;</div><div class="sub">// &#1045;&#1046;&#1045;&#1053;&#1045;&#1044;&#1045;&#1051;&#1068;&#1053;&#1067;&#1049; &#1044;&#1040;&#1049;&#1044;&#1046;&#1045;&#1057;&#1058; <span class="blink">_</span></div></div>'
+'<div class="dv"></div>'
+'<div style="text-align:center;margin-bottom:.5rem"><span class="bdg">&#1044;&#1040;&#1049;&#1044;&#1046;&#1045;&#1057;&#1058; #'+c.number+' &middot; '+c.dates+'</span></div>'
+'<div class="sts"><div class="st"><span class="sn">'+c.stats.tasks+'</span><div class="sl">&#1079;&#1072;&#1076;&#1072;&#1095; &#1079;&#1072;&#1082;&#1088;&#1099;&#1090;&#1086;</div></div><div class="st"><span class="sn">'+c.stats.saved+'</span><div class="sl">&#1089;&#1101;&#1082;&#1086;&#1085;&#1086;&#1084;&#1083;&#1077;&#1085;&#1086;</div></div><div class="st"><span class="sn">'+c.stats.players+'</span><div class="sl">&#1080;&#1075;&#1088;&#1086;&#1082;&#1072;</div></div><div class="st"><span class="sn">'+c.stats.potential+'</span><div class="sl">&#1087;&#1086;&#1090;&#1077;&#1085;&#1094;&#1080;&#1072;&#1083;</div></div></div>'
+'<div class="stl">&#1048;&#1043;&#1056;&#1054;&#1050;&#1048;</div>'
+'<div class="pg">'+c.players.map(pc).join("")+'</div>'
+'<div class="dv"></div>'
+c.players.map(db).join("")
+'<div class="dv"></div>'
+'<div class="stl">&#1040;&#1056;&#1061;&#1048;&#1042;</div>'
+'<div class="al">'+( d.archive||[] ).map(ai).join("")+'</div>'
+'<div class="ft"><span>PITERSTORY TEAM</span> &middot; II DIGEST<br><span style="color:var(--mu);font-size:13px">2025</span></div>';
c.players.forEach(function(p){var sp=SP[p.id];if(!sp)return;var cv=document.getElementById("cv-"+p.id);if(cv)ds(cv,sp.px,sp.p);});
}
function tl(btn){var b=btn.nextElementSibling,o=b.classList.toggle("open");btn.querySelector("span:last-child").textContent=o?"-":"+";}
function ta(el){var b=el.nextElementSibling,o=b.classList.toggle("open");el.querySelector(".ait").textContent=o?"[-]":"[+]";}
fetch("data.json").then(function(r){return r.json();}).then(render).catch(function(e){document.getElementById("app").innerHTML="<div style='padding:2rem;color:#ff006e;font-family:monospace'>ERROR: "+e+"</div>";});
</script>
</body></html>
